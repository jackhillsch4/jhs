name: G · Bootstrap Dims

on:
  workflow_dispatch:

jobs:
  dims:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: noveljack/screener
          token: ${{ secrets.SCREENER_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Inject secrets & vars
        env:
          CTX: ${{ secrets.CTX }}
          VARS: ${{ secrets.VARS }}
        run: python ci.py inject

      - name: Bootstrap stock + ETF master dims
        run: python ci.py 4

      - name: Push dims to Drive
        run: python ci.py 16
