name: A · Daily Screener

on:
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: noveljack/screener
          token: ${{ secrets.SCREENER_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Restore Kronos model cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: kronos-model-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Inject secrets & vars
        env:
          CTX: ${{ secrets.CTX }}
          VARS: ${{ secrets.VARS }}
        run: python ci.py inject

      - name: Screen shard ${{ matrix.shard }}
        run: python ci.py 1 --shard ${{ matrix.shard }} --total 8

      - name: Rank signals (shard 0 only)
        if: ${{ matrix.shard == 0 }}
        run: python ci.py 2

      - name: Push output to Drive (shard 0 only)
        if: ${{ matrix.shard == 0 }}
        run: python ci.py 16
